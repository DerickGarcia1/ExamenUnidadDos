info:
  name: Get Page
  type: http
  seq: 1

http:
  method: GET
  url: "{{PATH_URL}}/person?page=1&pageSize=5"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
